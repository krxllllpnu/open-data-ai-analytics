#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

runcmd:
  - - bash
    - -lc
    - |
      set -eux
      LOG_FILE="/var/log/open-data-ai-analytics-cloud-init.log"
      exec > >(tee -a "$LOG_FILE") 2>&1

      echo "Installing Docker and Docker Compose plugin..."
      mkdir -p /etc/apt/keyrings
      if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      fi
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      systemctl enable docker
      systemctl start docker

      echo "Preparing project repository..."
      PROJECT_DIR="/opt/app/project"
      REPO_URL="${repo_url}"
      REPO_BRANCH="prod"
      echo "Selected repository branch: $REPO_BRANCH"
      mkdir -p "$(dirname "$PROJECT_DIR")"
      if [ -d "$PROJECT_DIR/.git" ]; then
        echo "Repository already exists. Updating branch $REPO_BRANCH..."
        cd "$PROJECT_DIR"
        git fetch origin "$REPO_BRANCH"
        git checkout "$REPO_BRANCH"
        git pull origin "$REPO_BRANCH"
      elif [ -e "$PROJECT_DIR" ]; then
        echo "$PROJECT_DIR exists but is not a Git repository. Aborting to avoid overwriting files."
        exit 1
      else
        git clone --branch "$REPO_BRANCH" --single-branch "$REPO_URL" "$PROJECT_DIR"
        cd "$PROJECT_DIR"
      fi
      echo "Current repository commit: $(git rev-parse --short HEAD)"

      echo "Installing k3s..."
      bash scripts/install-k3s.sh
      echo "k3s installation completed successfully."

      echo "Starting main application stack..."
      docker compose -f ${compose_file} up -d
      echo "Main application stack started successfully."

      if [ -f monitoring/docker-compose.monitoring.yml ]; then
        echo "Starting monitoring stack..."
        cd "$PROJECT_DIR/monitoring"
        docker compose -f docker-compose.monitoring.yml up -d
        echo "Monitoring stack started successfully."
      else
        echo "Monitoring compose file not found. Skipping monitoring stack startup."
      fi

      echo "Installing Argo CD and applying GitOps Application..."
      cd "$PROJECT_DIR"
      PROJECT_DIR="$PROJECT_DIR" bash scripts/install-argocd.sh
      echo "Argo CD GitOps bootstrap completed successfully."
