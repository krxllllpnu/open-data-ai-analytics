#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

runcmd:
  - - bash
    - -lc
    - |
      set -eux
      LOG_FILE="/var/log/open-data-ai-analytics-cloud-init.log"
      exec > >(tee -a "$LOG_FILE") 2>&1

      echo "Installing Docker and Docker Compose plugin..."
      mkdir -p /etc/apt/keyrings
      if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      fi
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      systemctl enable docker
      systemctl start docker

      echo "Preparing project repository..."
      mkdir -p /opt/app
      if [ -d /opt/app/project/.git ]; then
        echo "Repository already exists. Pulling latest changes..."
        cd /opt/app/project
        git pull --ff-only
      elif [ -e /opt/app/project ]; then
        echo "/opt/app/project exists but is not a Git repository. Aborting to avoid overwriting files."
        exit 1
      else
        git clone ${repo_url} /opt/app/project
        cd /opt/app/project
      fi

      echo "Starting main application stack..."
      docker compose -f ${compose_file} up -d
      echo "Main application stack started successfully."

      if [ -f monitoring/docker-compose.monitoring.yml ]; then
        echo "Starting monitoring stack..."
        cd /opt/app/project/monitoring
        docker compose -f docker-compose.monitoring.yml up -d
        echo "Monitoring stack started successfully."
      else
        echo "Monitoring compose file not found. Skipping monitoring stack startup."
      fi
